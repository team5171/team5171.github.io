<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Live Stream...</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background-color: #f4f4f4;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div>
        <h1>2026 CA District San Francisco Event</h1>
        <p id="status">Checking for the active stream...</p>
        <div class="loader"></div>
        <p>If you are not redirected, <a id="manual-link" href="#">click here</a>.</p>
    </div>

    <script>
        // Stream URLs
        const day1Url = "https://www.youtube.com/watch?v=teZtwE8bQqU";
        const day2Url = "https://www.youtube.com/watch?v=eNgH7MA9oDE";

        function redirectToStream() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1; // Months are 0-indexed
            const day = now.getDate();

            let targetUrl = day1Url; // Default to Day 1

            // Logic: Switch to Day 2 if it is March 15, 2026 or later
            if (year >= 2026 && month >= 3 && day >= 15) {
                targetUrl = day2Url;
            }

            // Update UI
            document.getElementById('status').innerText = "Redirecting to " +
                (targetUrl === day1Url ? "Broadcast Day 1..." : "Broadcast Day 2...");
            document.getElementById('manual-link').href = targetUrl;

            // Perform Redirect after a short delay
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1000);
        }

        window.onload = redirectToStream;
    </script>
</body>

</html>
