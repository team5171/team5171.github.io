<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to SignUpGenius...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 2s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    a {
      color: #3498db;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div>
    <h1>2026 CA District Berkeley Event</h1>
    <p id="status">Redirecting to breakfast form...</p>
    <div class="loader"></div>
    <p>If you are not redirected, <a id="manual-link"
        href="https://docs.google.com/forms/d/e/1FAIpQLSfuk-KtlKsDx4Gm393aZ34JHLXX43sDQvFamMmfBj7XtASG-Q/viewform">click
        here</a>.</p>
  </div>

  <script>
    // Target URL
    const targetUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfuk-KtlKsDx4Gm393aZ34JHLXX43sDQvFamMmfBj7XtASG-Q/viewform";

    function performRedirect() {
      // Update UI link just in case
      document.getElementById('manual-link').href = targetUrl;

      // Perform Redirect after a short 1-second delay to show the loader
      setTimeout(() => {
        window.location.href = targetUrl;
      }, 1000);
    }

    // Trigger redirect on page load
    window.onload = performRedirect;
  </script>
</body>

</html>
